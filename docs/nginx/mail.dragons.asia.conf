# =============================================================================
# Reverse-proxy vhost for the mailcow webmail on  mail.dragons.asia
# (the host's "nginx tổng" owns 80/443; mailcow stays on 127.0.0.1:8080/8444)
#
# Install:
#   sudo cp mail.dragons.asia.conf /etc/nginx/sites-available/mail.dragons.asia
#   sudo ln -s /etc/nginx/sites-available/mail.dragons.asia \
#              /etc/nginx/sites-enabled/mail.dragons.asia
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - DNS: A record  mail.dragons.asia -> this server's public IP
#          (Cloudflare: DNS-only / grey cloud — do NOT proxy a mail host)
#   - mailcow.conf:  HTTP_PORT=8080  HTTPS_PORT=8444  HTTP_BIND=127.0.0.1  HTTPS_BIND=127.0.0.1
#   - A TLS cert for mail.dragons.asia (see "Cert" note at the bottom)
#   - Mail ports (25/465/587/143/993) are NOT handled here — mail clients connect
#     directly to mailcow's published ports; only HTTP(S) is reverse-proxied.
# =============================================================================

# ---- HTTP :80 — ACME challenge + redirect to HTTPS ----
server {
    listen      80;
    listen      [::]:80;
    server_name mail.dragons.asia;

    # Webroot for host certbot renewals: sudo mkdir -p /var/www/certbot
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — terminate TLS, reverse-proxy to mailcow ----
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name mail.dragons.asia;

    ssl_certificate     /etc/letsencrypt/live/mail.dragons.asia/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.dragons.asia/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Webmail/attachments can be large — don't cap or buffer the body.
    client_max_body_size 0;
    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass         https://127.0.0.1:8444;   # mailcow HTTPS_PORT
        proxy_ssl_verify   off;                       # mailcow uses a self-signed cert internally
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Cert — obtain once (host certbot, webroot):
#   sudo mkdir -p /var/www/certbot
#   sudo certbot certonly --webroot -w /var/www/certbot -d mail.dragons.asia
#   (or DNS-01 via Cloudflare token if you keep the orange cloud)
#
# IMPORTANT — mail (SMTP/IMAP) uses mailcow's OWN cert, not this one. Pick one:
#   (a) Share this cert into mailcow and disable its ACME:
#         cp .../fullchain.pem  <mailcow>/data/assets/ssl/cert.pem
#         cp .../privkey.pem    <mailcow>/data/assets/ssl/key.pem
#         mailcow.conf: SKIP_LETS_ENCRYPT=y
#         (add a certbot --deploy-hook to copy + `docker compose restart` on renewal)
#   (b) Let mailcow's ACME issue it (mailcow.conf: SKIP_LETS_ENCRYPT=n) and replace the
#       :80 acme-challenge block above with:
#         location ^~ /.well-known/acme-challenge/ { proxy_pass http://127.0.0.1:8080; }
#
# Also add this proxy's IP to mailcow's trusted proxies so logs/anti-spam see the real
# client IP (mailcow nginx already trusts 10/172/192.168 ranges by default).
# =============================================================================
