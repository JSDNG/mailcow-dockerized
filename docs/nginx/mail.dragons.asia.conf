# =============================================================================
# Reverse-proxy vhost for the mailcow WEBMAIL on  mail.dragons.asia
#
# Pattern (same as the other sites on this server): Cloudflare terminates HTTPS,
# this host nginx is HTTP-only on :80 and forwards to mailcow on 127.0.0.1:8444.
# No SSL cert is needed HERE — Cloudflare handles it (X-Forwarded-Proto = https).
#
# Install (keep the .conf extension — most setups include sites-enabled/*.conf;
# a file without .conf would be silently ignored). Drop "sudo" if you are root.
#   cp docs/nginx/mail.dragons.asia.conf /etc/nginx/sites-available/mail.dragons.asia.conf
#   ln -s /etc/nginx/sites-available/mail.dragons.asia.conf \
#         /etc/nginx/sites-enabled/mail.dragons.asia.conf
#   nginx -t && nginx -s reload           # (or: systemctl reload nginx)
#
# Prereqs:
#   - Cloudflare DNS: mail.dragons.asia -> server IP (web can be proxied/orange;
#     SSL mode "Flexible" => CF↔origin is HTTP:80, matching this file).
#   - mailcow.conf: HTTP_BIND=127.0.0.1  HTTPS_BIND=127.0.0.1 (keep 8080/8444);
#     add mail.dragons.asia to MAILCOW_HOSTNAME or ADDITIONAL_SERVER_NAMES.
#   - MAIL (SMTP/IMAP 25/465/587/143/993) does NOT go through nginx/Cloudflare —
#     see docs/HUONG-DAN-DOMAIN.md for the mail-host caveat.
# =============================================================================
server {
    listen      80;
    listen      [::]:80;
    server_name mail.dragons.asia;

    client_max_body_size 0;          # webmail attachments — no limit

    # Original scheme as seen by Cloudflare, so mailcow knows the client used HTTPS.
    set $forwarded_proto "https";
    if ($http_x_forwarded_proto) {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    location / {
        proxy_pass         https://127.0.0.1:8444;    # mailcow HTTPS_PORT
        proxy_ssl_verify   off;                        # mailcow uses a self-signed cert internally
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
