<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoho Mail — Clone (Demo)</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="zoho-app">

    <!-- ===================== TOP BAR ===================== -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand" data-icon="mailBrand"></span>
        <span class="brand-name">Mail</span>
      </div>
      <div class="topbar-tabs">
        <div class="tab tab-active"><span data-icon="mail"></span> Mail</div>
        <div class="tab"><span data-icon="restore"></span> Khôi phục 1 tab <span class="tab-close">×</span></div>
      </div>
      <div class="topbar-search">
        <span class="search-scope">Mail <span data-icon="caret"></span></span>
        <span class="search-divider"></span>
        <span data-icon="search" class="search-ico"></span>
        <input type="text" placeholder="Tìm kiếm ( / )" />
      </div>
      <div class="topbar-right">
        <span class="tb-ico" data-icon="cloud"></span>
        <span class="tb-ico" data-icon="bell"></span>
        <span class="avatar avatar-sm" style="background:#7a8aa3">
          <span class="avatar-status"></span>
        </span>
        <span class="tb-ico" data-icon="grid"></span>
      </div>
    </header>

    <!-- ===================== MAIN ===================== -->
    <div class="main">

      <!-- App rail (far left) -->
      <nav class="app-rail">
        <a class="app-item app-active"><span data-icon="mail"></span><em>Mail</em></a>
        <a class="app-item"><span data-icon="calendar"></span><em>Lịch</em></a>
        <a class="app-item"><span data-icon="tasks"></span><em>Danh Sách Việc Cần Làm</em></a>
        <a class="app-item"><span data-icon="notes"></span><em>Ghi chú</em></a>
        <a class="app-item"><span data-icon="contacts"></span><em>Số liên lạc</em></a>
        <a class="app-item"><span data-icon="bookmark"></span><em>Dấu trang</em></a>
        <a class="app-item"><span data-icon="globe"></span><em>Các Web Tab</em></a>
      </nav>

      <!-- Folder panel -->
      <aside class="folder-panel">
        <button class="compose-btn">
          Mail Mới <span class="compose-caret" data-icon="caret"></span>
        </button>
        <div class="folder-quicklinks" id="quicklinks"></div>
        <div class="folder-section-title">
          THƯ MỤC <span class="section-actions"><span data-icon="gear"></span><span data-icon="plus"></span></span>
        </div>
        <ul class="folder-list" id="folder-list"></ul>
        <div class="folder-section-title">
          TAG <span class="section-actions"><span data-icon="plus"></span></span>
        </div>
        <div class="folder-section-title">GIAO DIỆN</div>
        <ul class="folder-list" id="view-list"></ul>
      </aside>

      <!-- Mail list -->
      <section class="mail-list">
        <div class="mail-list-header">
          <h1 id="ml-title">Hộp thư đến</h1>
          <span class="ml-unread"> • <a id="ml-unread"></a></span>
        </div>
        <div class="mail-list-toolbar">
          <label class="ml-check"><input type="checkbox" /><span data-icon="caret"></span></label>
          <button class="ml-tool"><span data-icon="move"></span> Chuyển đến</button>
          <button class="ml-tool"><span data-icon="tag"></span> Tag là</button>
          <button class="ml-tool"><span data-icon="trash"></span> Xóa</button>
          <button class="ml-tool ml-more"><span data-icon="more"></span></button>
        </div>
        <div class="mail-list-sort">
          <span data-icon="sort"></span> <span id="ml-sort">Order Received</span>
        </div>
        <div class="mail-list-body" id="mail-list-body"></div>
      </section>

      <!-- Reading pane -->
      <section class="reading-pane" id="reading-pane"></section>

      <!-- Tools rail (far right) -->
      <nav class="tools-rail">
        <span class="tr-ico tr-top" data-icon="gear"></span>
        <span class="tr-ico" data-icon="attach"></span>
        <span class="tr-ico" data-icon="window"></span>
        <span class="tr-ico" data-icon="calendar"></span>
        <span class="tr-ico" data-icon="clock"></span>
        <span class="tr-ico tr-badge" data-icon="mail"></span>
        <span class="tr-ico" data-icon="notes"></span>
        <span class="tr-ico" data-icon="link"></span>
        <span class="tr-ico" data-icon="check"></span>
        <span class="tr-ico" data-icon="image"></span>
        <span class="tr-ico" data-icon="puzzle"></span>
        <span class="tr-ico" data-icon="plusbox"></span>
        <span class="tr-ico" data-icon="bolt"></span>
        <span class="tr-ico tr-badge" data-icon="megaphone"></span>
        <span class="tr-ico" data-icon="clock"></span>
        <span class="tr-spacer"></span>
        <span class="tr-ico" data-icon="theme"></span>
        <span class="tr-ico tr-chat" data-icon="chat"></span>
      </nav>
    </div>

    <!-- ===================== BOTTOM BAR ===================== -->
    <footer class="bottombar">
      <div class="bb-left">
        <span class="bb-item bb-active"><span class="bb-dot"></span><span data-icon="chat"></span> Chat</span>
        <span class="bb-item"><span data-icon="channels"></span> Kênh</span>
        <span class="bb-item"><span data-icon="contacts"></span> Liên hệ</span>
        <span class="bb-hint">Đây là nội dung Smart Chat của bạn (Ctrl+Space)</span>
      </div>
      <div class="bb-right"><span data-icon="search"></span></div>
    </footer>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
